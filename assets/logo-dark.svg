<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="ld-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E1B33"/>
      <stop offset="100%" stop-color="#050B18"/>
    </linearGradient>
    <linearGradient id="ld-a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A5C4FF"/>
      <stop offset="55%" stop-color="#4D7EFF"/>
      <stop offset="100%" stop-color="#2E52BE"/>
    </linearGradient>
    <linearGradient id="ld-b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#BBDCFF"/>
      <stop offset="50%" stop-color="#7BA4FF"/>
      <stop offset="100%" stop-color="#3E6EEF"/>
    </linearGradient>
    <linearGradient id="ld-c" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9FE9FF"/>
      <stop offset="100%" stop-color="#4D7EFF"/>
    </linearGradient>
  </defs>

  <!-- Dark blue square background -->
  <rect width="100" height="100" rx="0" fill="url(#ld-bg)"/>

  <!--
    Logo mark is 64x48 in its natural coords.
    We want it centered in a 100x100 canvas with ~18px padding on each side.
    Available width: 64px (100-18-18). Scale = 64/64 = 1.0, but height = 48 -> fits in 64.
    Translate: x=18, y=(100-48)/2=26
  -->
  <g transform="translate(18 26)">
    <path d="M3 5 L10 3.5 L19 32 L26 16 L30.5 26 L24 44 L16 44 Z"
          fill="url(#ld-a)" stroke="#E9F1FF" stroke-width="0.3" stroke-opacity="0.35"/>
    <path d="M26 5 L34 3.5 L41 28 L55 8 L61 10.5 L46 40 L38 44 L32 38 Z"
          fill="url(#ld-b)" stroke="#E9F1FF" stroke-width="0.3" stroke-opacity="0.35"/>
    <path d="M6 6 L9 5 L15 24 L13 27 Z" fill="#E9F1FF" opacity="0.15"/>
    <path d="M29 6 L32 5 L38 24 L35 28 Z" fill="#E9F1FF" opacity="0.15"/>
    <path d="M52 4 L62 5.5 L58 14 Z" fill="url(#ld-c)"/>
  </g>
</svg>
