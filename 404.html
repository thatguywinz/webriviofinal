<style>
  .err-wrap {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 120px var(--gutter) 80px;
    position: relative;
    overflow: hidden;
  }
  .err-wrap .orb {
    position: absolute;
    top: 10%; right: -20%;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 40%, rgba(127,227,255,0.3), rgba(77,126,255,0.2) 40%, transparent 70%);
    filter: blur(60px);
    animation: drift 20s ease-in-out infinite;
    z-index: 0;
  }
  .err-inner { position: relative; z-index: 1; text-align: center; max-width: 720px; }
  .err-mono {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent-glow);
  }
  .err-huge {
    font-family: var(--serif);
    font-size: clamp(120px, 22vw, 340px);
    line-height: 0.85;
    letter-spacing: -0.04em;
    font-style: italic;
    background: linear-gradient(180deg, var(--ink) 20%, var(--accent-glow) 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    margin: 20px 0 30px;
  }
  .err-h2 {
    font-family: var(--serif);
    font-size: clamp(32px, 5vw, 56px);
    line-height: 1;
    letter-spacing: -0.02em;
    margin-bottom: 20px;
  }
  .err-h2 .it { font-style: italic; color: var(--accent-glow); }
  .err-underline { position: relative; display: inline-block; }
  .err-underline svg { position: absolute; left: 0; bottom: -0.04em; width: 100%; height: 0.14em; overflow: visible; }
  .err-underline svg path { fill: none; stroke: var(--cyan); stroke-width: 2; opacity: 0.5; stroke-dasharray: 1; stroke-dashoffset: 1; animation: errDraw .6s var(--ease-out) .5s forwards; }
  @keyframes errDraw { to { stroke-dashoffset: 0; } }
  @media (prefers-reduced-motion: reduce) { .err-underline svg path { animation: none; stroke-dashoffset: 0; } }
  .err-p { color: var(--ink-soft); font-size: 18px; max-width: 48ch; margin: 0 auto 40px; }
  .err-actions { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
</style>

    <div class="err-actions">

        <span>Back to home</span>

      </a>
      <a class="btn btn-ghost" href="/contact">
        <span>Get in touch</span>
      </a>
    </div>
  </div>
</main>
